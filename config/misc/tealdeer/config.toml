[style.description]
underline = false
bold = false
italic = false

[style.command_name]
foreground = "cyan"
underline = false
bold = false
italic = false

[style.example_text]
foreground = "green"
underline = false
bold = false
italic = false

[style.example_code]
foreground = "cyan"
underline = false
bold = false
italic = false

[style.example_variable]
foreground = "cyan"
underline = true
bold = false
italic = false

[display]
compact = false
use_pager = false
show_title = false

[updates]
auto_update = false
auto_update_interval_hours = 720
archive_source = "https://github.com/tldr-pages/tldr/releases/latest/download/"
# rustls-with-native-roots uses the system CA store, which is needed in
# environments where a corporate TLS proxy (e.g. Zscaler) intercepts HTTPS.
# The default "rustls-with-webpki-roots" only trusts Mozilla's compiled-in list.
tls_backend = "rustls-with-native-roots"

